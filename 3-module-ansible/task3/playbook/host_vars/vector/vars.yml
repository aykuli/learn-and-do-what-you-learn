---
vector_version: "0.55.0"
sinks:
  to_clickhouse:
    compression: gzip
    database: logs
    endpoint: http://  :8123
    healthcheck: false
    inputs:
    - our_logs
    skip_unknown_fields: true
    table: my_table
    type: clickhouse
sources:
  our_log:
    ignore_older_secs: 600
    include:
    - ~/logs/*.log
    read_from: beginning
    type: file