---
- name: Сreate VMs and inventory file for them
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Create Yandex Cloud VMs
      aykuli.yandex_cloud_elk.vms:
        image_family: 'ubuntu-2404-lts'
        names:
          - clickhouse
          - vector
          - lighthouse
      register: result_vms
    - name: Print resulting messages of creating VMs
      ansible.builtin.debug:
        msg: "{{ result_vms }}"
    - name: Write prev content to inventory/prod.yml file
      aykuli.yandex_cloud_elk.fcreate:
        path: inventory/prod.yml
        content: "{{ result_vms.message }}"

- name: Install Clickhouse
  hosts: clickhouse
  remote_user: root
  roles:
    - ansible-clickhouse
  tasks:
    - name: Create structural table inside the logs database
      ansible.builtin.command: >
        clickhouse-client -q "
        CREATE TABLE IF NOT EXISTS logs.applogs (
            timestamp DateTime64(3), message String
        ) ENGINE = MergeTree() ORDER BY timestamp;"
      register: clickhouse_table_result
      changed_when: "'already exists' not in clickhouse_table_result.stderr"

- name: Install Lighthouse
  hosts: lighthouse
  roles:
    - lighthouse

- name: Install Vector
  hosts: vector
  roles:
    - vector
